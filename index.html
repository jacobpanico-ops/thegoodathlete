/* ── On-screen error overlay — mobile-safe diagnostic when console is unreachable.
   Shows any uncaught JS error or unhandled promise rejection as a red banner at
   bottom of screen. Tap to dismiss. Remove once mobile debug console is set up. */
(function(){
  var el = document.getElementById('tga-err-overlay');
  function show(msg){
    try { el.textContent = String(msg).slice(0, 2000); el.style.display = 'block'; } catch(e){}
  }
  el.addEventListener('click', function(){ el.style.display='none'; });
  window.addEventListener('error', function(e){
    show('ERROR: ' + (e.message||'') + '\n' + (e.filename||'') + ':' + (e.lineno||'') + ':' + (e.colno||'') + '\n(tap to dismiss)');
  });
  window.addEventListener('unhandledrejection', function(e){
    var r = e.reason;
    var m = (r && (r.message || r.error_description || r.toString())) || 'unknown rejection';

  });
})();

      regs.forEach(function(r){ r.unregister(); });
    }).catch(function(){});
  }
})();
