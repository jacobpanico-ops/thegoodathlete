<style>
:root{--bg:#08080C;--g1:#00FF87;--g4:#00CC6A;--g6:#66FFAA;--g7:#99FFCC;--g0:#009950;--pr:#7C3AED;--pr2:#A855F7;--ember:#FF6D00;--grn:#00FF87;--red:#EF5350;--txt:#F0F0F4;--dim:#4A4A5A;--sub:#8A8A9A}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;overflow-x:hidden;overscroll-behavior:none}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;font-weight:500;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 0%,rgba(124,58,237,0.04),transparent 50%),radial-gradient(ellipse at 70% 100%,rgba(0,255,135,0.02),transparent 50%);pointer-events:none}
/* Lime shimmer text */
.gs{background:linear-gradient(90deg,var(--g0),var(--g4),var(--g1),var(--g6),#fff,var(--g6),var(--g1),var(--pr),var(--g0));background-size:400% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:sh 3s linear infinite}
@keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
/* Cards — cool dark */
.gc{background:linear-gradient(160deg,rgba(16,16,22,0.95),rgba(8,8,14,0.98));border:1px solid rgba(124,58,237,0.06);border-radius:18px}
.gc2{background:linear-gradient(160deg,rgba(28,24,40,0.6),rgba(12,10,20,0.85));border:1px solid rgba(0,255,135,0.12);border-radius:18px}
.xb{height:12px;background:rgba(0,100,55,0.15);border-radius:12px;overflow:hidden;border:1px solid rgba(0,255,135,0.08)}
.xf{height:100%;border-radius:12px;background:linear-gradient(90deg,var(--pr),var(--g0),var(--g4),var(--g1),var(--g6));background-size:200% 100%;transition:width 1s ease;position:relative}
.gd{height:2px;background:linear-gradient(90deg,transparent,var(--pr),var(--g1),var(--pr),transparent);margin:18px 0;opacity:0.4}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.fu{animation:fadeUp 0.4s ease both}.ci{animation:cardIn 0.35s ease both}.pi{animation:popIn 0.5s cubic-bezier(0.34,1.5,0.64,1) both}
.fi{display:inline-block;animation:fp .6s ease-in-out infinite alternate}
@keyframes fp{0%{transform:scale(1)}100%{transform:scale(1.2);filter:brightness(1.5) drop-shadow(0 0 8px #FF6D00)}}
input,select,textarea{font-family:'Inter',sans-serif}
input::placeholder{color:#2a2a38}
input:focus,select:focus{border-color:var(--g1)!important;box-shadow:0 0 0 3px rgba(0,255,135,0.1);outline:none}
button{font-family:'Inter',sans-serif;cursor:pointer;font-weight:600}
button:active{transform:scale(0.95)!important}
::-webkit-scrollbar{width:0}select option{background:#0a0800;color:var(--txt)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:300;padding:12px 24px;border-radius:14px;font-family:'Inter',sans-serif;font-size:16px;letter-spacing:2px;animation:fadeUp 0.3s ease}
.toast-ok{background:linear-gradient(135deg,var(--g0),var(--g1));color:var(--bg)}
.toast-err{background:linear-gradient(135deg,#8B0000,var(--red));color:#fff}
.btn-gold{padding:18px;border-radius:14px;border:none;font-family:'Space Grotesk',sans-serif;font-size:24px;letter-spacing:3px;background:linear-gradient(135deg,var(--g0),var(--g4),var(--g1));color:var(--bg);box-shadow:0 4px 30px rgba(0,255,135,0.2);width:100%}
.btn-gold:disabled{background:#0a0a10;color:#2a2a38;box-shadow:none;opacity:0.5}
.inp{width:100%;padding:14px 16px;border-radius:14px;background:rgba(12,12,18,0.8);border:2px solid rgba(124,58,237,0.06);color:var(--txt);font-size:16px;font-weight:600;outline:none;box-sizing:border-box}
.lbl{font-family:'Inter',sans-serif;font-size:14px;color:var(--sub);display:block;margin-bottom:6px;letter-spacing:3px}
</style>

/* ╔══════════════════════════════════════════════════════════════════════╗

/* ████████████████████████████████████████████████████████████████████████

var ALL_SPORTS=["Football","Basketball","Volleyball","Soccer","Track & Field","Baseball","Softball","Wrestling","Tennis","Golf","Swimming","Cross Country","Cheer","Bowling"];

/* ████████████████████████████████████████████████████████████████████████
   §5  UTILITY FUNCTIONS — Level calc, date helpers
   ████████████████████████████████████████████████████████████████████████ */

/* gL(xp): Get current level | gN(xp): Get next level | gP(xp): Progress % */
function gL(xp){var v=LVS[0];for(var i=0;i<LVS.length;i++)if(xp>=LVS[i].x)v=LVS[i];return v}
function gN(xp){for(var i=0;i<LVS.length;i++)if(xp<LVS[i].x)return LVS[i];return null}
function gP(xp){var c=gL(xp),n=gN(xp);return n?Math.min(100,((xp-c.x)/(n.x-c.x))*100):100}
function today(){return new Date().toISOString().split('T')[0]}


/* ████████████████████████████████████████████████████████████████████████
   §6  SHARED COMPONENTS — SportTag, Toast
   ████████████████████████████████████████████████████████████████████████ */

function ST({s}){var h=ALL_SPORTS.indexOf(s)*25;return <span style={{fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:12,background:"hsla("+h+",45%,40%,0.2)",color:"hsla("+h+",50%,65%,1)",border:"1px solid hsla("+h+",45%,40%,0.25)",letterSpacing:"1.5px",textTransform:"uppercase",fontFamily:D2}}>{s}</span>}

var toastTimer=null;
function Toast({msg,type}){if(!msg)return null;return <div className={"toast toast-"+(type||"ok")}>{msg}</div>}


/* ████████████████████████████████████████████████████████████████████████
   §7  AUTH SCREEN — Sign Up / Sign In
   ████████████████████████████████████████████████████████████████████████ */

function AuthScreen({onAuth,toast}){
  var[mode,setMode]=useState("signin"); // signin | signup
  var[email,setEmail]=useState("");var[pass,setPass]=useState("");var[loading,setLoading]=useState(false);

  async function handleSubmit(){
    if(!email.trim()||!pass.trim())return toast("Fill in all fields","err");
    if(pass.length<6)return toast("Password must be 6+ characters","err");
    setLoading(true);
    var res;
    if(mode==="signup"){
      res=await SB.auth.signUp({email:email.trim(),password:pass});
      if(res.error){setLoading(false);return toast(res.error.message,"err")}
      toast("Account created! Check your email if confirmation is required.","ok");
    } else {
      res=await SB.auth.signInWithPassword({email:email.trim(),password:pass});
      if(res.error){setLoading(false);return toast(res.error.message,"err")}
    }
    setLoading(false);
  }

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",justifyContent:"center",padding:"40px 24px",position:"relative"}}>
      <div style={{position:"absolute",top:"5%",left:"50%",transform:"translateX(-50%)",width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,rgba(124,58,237,0.06),transparent 60%)",pointerEvents:"none"}} />
      <div style={{textAlign:"center",marginBottom:40,position:"relative",zIndex:1}}>
        <div style={{fontSize:72,marginBottom:16}} className="pi">{SCHOOL.LOGO}</div>
        <h1 className="gs" style={{fontFamily:D,fontSize:72,margin:0,lineHeight:0.85,letterSpacing:"3px"}}>{SCHOOL.APP_NAME}</h1>
        <p style={{fontFamily:D2,fontSize:20,color:"var(--g0)",margin:"10px 0 0",letterSpacing:"8px"}}>{SCHOOL.SCHOOL_NAME||SCHOOL.TAGLINE}</p>
      </div>
      <div style={{maxWidth:400,margin:"0 auto",width:"100%",position:"relative",zIndex:1}}>
        {/* Toggle */}
        <div style={{display:"flex",gap:4,marginBottom:24}}>
          {["signin","signup"].map(function(m){return <button key={m} onClick={function(){setMode(m)}} style={{flex:1,padding:"10px",borderRadius:12,fontFamily:D2,fontSize:16,letterSpacing:"3px",background:mode===m?"rgba(0,255,135,0.1)":"transparent",color:mode===m?"var(--g1)":"var(--dim)",border:"1.5px solid "+(mode===m?"rgba(0,255,135,0.2)":"rgba(0,255,135,0.04)")}}>{m==="signin"?"SIGN IN":"SIGN UP"}</button>})}
        </div>

        <label className="lbl">EMAIL</label>
        <input className="inp" value={email} onChange={function(e){setEmail(e.target.value)}} type="email" placeholder="you@school.edu" style={{marginBottom:16}} />

        <label className="lbl">PASSWORD</label>
        <input className="inp" value={pass} onChange={function(e){setPass(e.target.value)}} type="password" placeholder={mode==="signup"?"Create a password (6+ chars)":"Your password"} style={{marginBottom:24}} />

        <button className="btn-gold" onClick={handleSubmit} disabled={loading||!email.trim()||!pass.trim()}>
          {loading?"...":(mode==="signin"?"LET'S GO →":"CREATE ACCOUNT →")}
        </button>

        {mode==="signup"&&<div style={{textAlign:"center",marginTop:16,fontFamily:D2,fontSize:13,color:"var(--dim)",letterSpacing:"1px"}}>ALREADY HAVE AN ACCOUNT? <button onClick={function(){setMode("signin")}} style={{background:"none",border:"none",color:"var(--g4)",fontFamily:D2,fontSize:13,letterSpacing:"1px",textDecoration:"underline"}}>SIGN IN</button></div>}
      </div>
    </div>
  );
}


/* ████████████████████████████████████████████████████████████████████████
   §8  ONBOARDING — Role, name, grade, sports selection
   ████████████████████████████████████████████████████████████████████████ */

function Onboarding({user,onDone,toast}){
  var[role,setRole]=useState(null);var[first,setFirst]=useState("");var[last,setLast]=useState("");
  var[grade,setGrade]=useState("");var[sports,setSports]=useState([]);var[loading,setLoading]=useState(false);
  function togSport(s){setSports(function(p){return p.includes(s)?p.filter(function(x){return x!==s}):[].concat(p,[s])})}
  var ok=first.trim()&&last.trim()&&role&&(role!=="athlete"||(grade&&sports.length>0))&&(role!=="coach"||sports.length===1);

  async function submit(){
    setLoading(true);
    var res=await SB.rpc('complete_onboarding',{
      p_role:role,p_first_name:first.trim(),p_last_name:last.trim(),
      p_grade:role==="athlete"?parseInt(grade):null,
      p_sports:sports
    });
    if(res.error){setLoading(false);return toast(res.error.message,"err")}
    toast("Welcome to "+SCHOOL.APP_NAME+"!","ok");
    onDone();
  }

  return(
    <div style={{minHeight:"100vh",padding:"40px 24px",position:"relative"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:48,marginBottom:8}}>{SCHOOL.LOGO}</div>
        <h1 className="gs" style={{fontFamily:D,fontSize:44,lineHeight:0.85}}>SET UP YOUR PROFILE</h1>
      </div>
      <div style={{maxWidth:420,margin:"0 auto"}}>
        {/* Role */}
        {!role&&<div className="fu">
          <p style={{fontFamily:D2,fontSize:16,color:"var(--dim)",textAlign:"center",letterSpacing:"4px",marginBottom:16}}>I AM A...</p>
          {[{id:"athlete",l:"STUDENT-ATHLETE",i:"◆"},{id:"coach",l:"COACH",i:"▲"},{id:"ad",l:"ATHLETIC DIRECTOR",i:"⬡"}].map(function(r){return <button key={r.id} onClick={function(){setRole(r.id)}} className="gc2" style={{display:"flex",alignItems:"center",gap:14,padding:"18px 20px",width:"100%",textAlign:"left",marginBottom:12}}>
            <span style={{fontSize:30}}>{r.i}</span>
            <span style={{fontFamily:D,fontSize:26,color:"var(--g6)"}}>{r.l}</span>
          </button>})}
        </div>}

        {role&&<div className="fu">
          <button onClick={function(){setRole(null);setSports([])}} style={{background:"none",border:"none",color:"var(--dim)",fontFamily:D2,fontSize:16,letterSpacing:"3px",marginBottom:18}}>← BACK</button>

          <label className="lbl">FIRST NAME</label>
          <input className="inp" value={first} onChange={function(e){setFirst(e.target.value)}} placeholder="First name" style={{marginBottom:16}} />

          <label className="lbl">LAST NAME</label>
          <input className="inp" value={last} onChange={function(e){setLast(e.target.value)}} placeholder="Last name" style={{marginBottom:16}} />

          {role==="athlete"&&<>
            <label className="lbl">GRADE</label>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {["9","10","11","12"].map(function(g){return <button key={g} onClick={function(){setGrade(g)}} style={{flex:1,padding:"12px",borderRadius:12,fontFamily:D,fontSize:24,background:grade===g?"rgba(0,255,135,0.15)":"rgba(12,12,18,0.8)",color:grade===g?"var(--g1)":"var(--dim)",border:"2px solid "+(grade===g?"rgba(0,255,135,0.3)":"rgba(0,255,135,0.04)")}}>{g}</button>})}
            </div>
            <label className="lbl">MY SPORTS <span style={{color:"var(--dim)"}}>(SELECT ALL)</span></label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
              {ALL_SPORTS.map(function(s){var on=sports.includes(s);return <button key={s} onClick={function(){togSport(s)}} style={{padding:"8px 14px",borderRadius:12,fontFamily:D2,fontSize:13,letterSpacing:"1px",background:on?"rgba(0,255,135,0.12)":"rgba(12,12,18,0.8)",color:on?"var(--g1)":"var(--dim)",border:"1.5px solid "+(on?"rgba(0,255,135,0.3)":"rgba(0,255,135,0.04)")}}>{on?"✓ ":""}{s.toUpperCase()}</button>})}
            </div>
          </>}

          {role==="coach"&&<>
            <label className="lbl">MY TEAM (SELECT ONE)</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:24}}>
              {ALL_SPORTS.map(function(s){var on=sports.includes(s);return <button key={s} onClick={function(){setSports([s])}} style={{padding:"8px 14px",borderRadius:12,fontFamily:D2,fontSize:13,letterSpacing:"1px",background:on?"rgba(0,255,135,0.12)":"rgba(12,12,18,0.8)",color:on?"var(--g1)":"var(--dim)",border:"1.5px solid "+(on?"rgba(0,255,135,0.3)":"rgba(0,255,135,0.04)")}}>{on?"✓ ":""}{s.toUpperCase()}</button>})}
            </div>
          </>}

          <button className="btn-gold" onClick={submit} disabled={!ok||loading}>{loading?"SAVING...":"LET'S GO →"}</button>
        </div>}
      </div>
    </div>
  );
}


/* ████████████████████████████████████████████████████████████████████████
   §9  DAILY HUDDLE — Card-stack check-in
   Cards: Sleep → Readiness/Stress/Body → Work → Fuel → Summary
   ████████████████████████████████████████████████████████████████████████ */

function Huddle({profile,onDone,onCancel,toast}){
  var TOTAL=5;var[card,setCard]=useState(0);var[saving,setSaving]=useState(false);
  var[sleepHrs,setSleepHrs]=useState(null);var[sleepQ,setSleepQ]=useState(null);
  var[readiness,setReadiness]=useState(null);var[stress,setStress]=useState(null);
  var[painZones,setPainZones]=useState([]);var[painLevel,setPainLevel]=useState(3);
  var[sessions,setSessions]=useState([]);var[editSport,setEditSport]=useState(null);
  var[editType,setEditType]=useState("");var[editRpe,setEditRpe]=useState(6);var[editDur,setEditDur]=useState(null);
  var[editPhoto,setEditPhoto]=useState(null); /* proof of grind photo/video */
  var[coachTask,setCoachTask]=useState(false);var[didWork,setDidWork]=useState(null);
  var[hydration,setHydration]=useState(0);var[fuelWindow,setFuelWindow]=useState(null);var[mealColor,setMealColor]=useState(null);

  function togZone(id){setPainZones(function(p){return p.includes(id)?p.filter(function(x){return x!==id}):[].concat(p,[id])})}

  function calcPts(){
    var p=10;
    if(sleepHrs&&["8","9","10+"].includes(sleepHrs))p+=20;

    if(mealColor==="green")p+=5;

    var proofCount=sessions.filter(function(s){return s.proof}).length;
    p+=proofCount*5;

  /* §9f-1 Readiness Score + Red Flag calculation
     Score: 0-100 (higher = better). Three weighted components:
       Sleep (35 pts):  hours + quality
       Stress (30 pts): school/life stress inverse
       Pain (35 pts):   zone count, severity, critical zones
     Red Flag triggers (any one = true):
       - Head or neck pain
       - Self-reported "exhausted"
       - Readiness score below 30
       - Stress 5 + pain zones 2+                                       */
  function calcReadiness() {
    var score = 0;
    var redFlag = false;
    var reasons = [];

    // ── Sleep component (35 pts max) ──
    var hrsMap = {"<6":5, "6":12, "7":22, "8":30, "9":35, "10+":35};
    var sleepScore = hrsMap[sleepHrs] || 15;
    if (sleepQ === "bad") sleepScore = Math.max(0, sleepScore - 12);
    score += sleepScore;

    // ── Stress component (30 pts max) ──
    // Inverse: stress 1 = 30pts, stress 5 = 0pts
    var stressScore = Math.max(0, 30 - ((stress - 1) * 7.5));
    score += stressScore;

    // ── Pain component (35 pts max) ──
    var CRITICAL = ["head", "neck"];
    var hasCritical = painZones.some(function(z) { return CRITICAL.includes(z); });
    var painScore = 35;

    if (hasCritical) {
      painScore = 0;
      redFlag = true;
      reasons.push("Head/neck pain reported");
    } else if (painZones.length >= 3) {
      painScore = 5;
    } else if (painZones.length >= 1) {
      // Scale by pain level: mild (1-3) = small hit, severe (7+) = big hit
      var severityPenalty = Math.min(30, painZones.length * painLevel * 2);
      painScore = Math.max(5, 35 - severityPenalty);
    }
    score += painScore;

    // ── Red flag checks ──
    if (readiness === "exhausted") {
      redFlag = true;
      reasons.push("Self-reported exhausted");
    }

    if (score < 30 && !redFlag) {
      redFlag = true;
      reasons.push("Readiness score critical (" + Math.round(score) + "/100)");
    }

    if (stress >= 5 && painZones.length >= 2 && !redFlag) {
      redFlag = true;
      reasons.push("Max stress + multiple pain zones");
    }

    return {
      score: Math.round(Math.min(100, Math.max(0, score))),
      redFlag: redFlag,
      reasons: reasons
    };
  }

    });

    }
    setSaving(false);
    onDone({points:ciData.points,streak:ciData.streak,xp:ciData.xp,sessions:sessions,readiness:rd});

                <div style={{fontFamily:D2,fontSize:12,color:editPhoto?"var(--grn)":"var(--dim)",letterSpacing:"0.5px"}}>{editPhoto?"VERIFIED SESSION · +5 GP BONUS":"SNAP A PHOTO OR VIDEO · +5 GP"}</div>
              </div>
              {!editPhoto&&<button onClick={function(){if(fileRef.current)fileRef.current.click()}} style={{padding:"10px 18px",borderRadius:12,border:"none",background:"linear-gradient(135deg,var(--g0),var(--g4))",fontFamily:D,fontSize:16,color:"var(--bg)",letterSpacing:"1px",flexShrink:0}}>📷 SNAP</button>}
            </div>
            {editPhoto&&<div style={{display:"flex",alignItems:"center",gap:10}}>

              <div style={{flex:1}}>
                <button onClick={function(){if(fileRef.current)fileRef.current.click()}} style={{background:"none",border:"1px solid rgba(0,255,135,0.1)",borderRadius:10,padding:"6px 14px",fontFamily:D2,fontSize:12,color:"var(--g4)",letterSpacing:"1px",marginRight:8}}>RETAKE</button>
                <button onClick={function(){setEditPhoto(null);if(fileRef.current)fileRef.current.value=""}} style={{background:"none",border:"1px solid rgba(239,83,80,0.2)",borderRadius:10,padding:"6px 14px",fontFamily:D2,fontSize:12,color:"var(--red)",letterSpacing:"1px"}}>REMOVE</button>
              </div>
            </div>}
            {!editPhoto&&<div style={{fontFamily:D2,fontSize:11,color:"var(--dim)",letterSpacing:"0.5px",marginTop:8}}>SWEAT ON THE FLOOR · WEIGHT ON THE BAR · LAST REP OF THE SET</div>}
          </div>

          <button onClick={addSession} disabled={!editType||!editDur} className="btn-gold" style={{fontSize:20,padding:14}}>LOG SESSION ✓</button>
        </div>}

        {didWork!==null&&!editSport&&<div onClick={function(){setCoachTask(!coachTask)}} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",borderRadius:16,background:coachTask?"rgba(76,175,80,0.1)":"rgba(12,12,18,0.8)",border:"2px solid "+(coachTask?"rgba(76,175,80,0.3)":"rgba(0,255,135,0.04)"),marginTop:8,cursor:"pointer"}}>
          <div style={{width:26,height:26,borderRadius:8,border:"2px solid "+(coachTask?"#4CAF50":"rgba(0,255,135,0.15)"),display:"flex",alignItems:"center",justifyContent:"center",background:coachTask?"#4CAF50":"transparent",fontSize:14,color:"#fff"}}>{coachTask?"✓":""}</div>
          <div><div style={{fontFamily:D2,fontSize:15,color:coachTask?"#4CAF50":"var(--txt)",letterSpacing:"1px"}}>COACH'S DAILY TASK</div><div style={{fontFamily:D2,fontSize:11,color:"var(--dim)"}}>+15 GP</div></div>
        </div>}
      </div>}

      {/* ═══ CARD 3: FUEL ═══ */}
      
      {/* ═══ §9d CARD 3: FUEL ═══ */}
      {card===3&&<div className="ci" key="c3" style={{flex:1,padding:"24px 20px",overflowY:"auto"}}>
        <div style={{fontSize:44,marginBottom:4}}>🍽️</div>
        <h2 className="gs" style={{fontFamily:D,fontSize:52,lineHeight:0.85}}>FUEL</h2>
        <p style={{fontFamily:D2,fontSize:14,color:"var(--sub)",letterSpacing:"2px",margin:"6px 0 20px"}}>HOW DID YOU FUEL?</p>
        <label className="lbl">HYDRATION</label>
        <div style={{display:"flex",gap:4,marginBottom:4,justifyContent:"center"}}>{[1,2,3,4,5,6,7,8].map(function(b){return <button key={b} onClick={function(){setHydration(b)}} style={{fontSize:b<=hydration?26:22,filter:b<=hydration?"none":"grayscale(1) opacity(0.2)",background:"none",border:"none",padding:2}}>💧</button>})}</div>
        <div style={{textAlign:"center",fontFamily:D2,fontSize:14,color:hydration>=6?"var(--grn)":"var(--dim)",letterSpacing:"1px",marginBottom:20}}>{hydration} BOTTLE{hydration!==1?"S":""}</div>
        <label className="lbl">EAT WITHIN 45 MIN OF WORKOUT?</label>
        <div style={{display:"flex",gap:10,marginBottom:20}}>{[{id:"yes",l:"YES"},{id:"no",l:"NO"},{id:"na",l:"N/A"}].map(function(o){return <button key={o.id} onClick={function(){setFuelWindow(o.id)}} style={{flex:1,padding:"14px",borderRadius:14,fontFamily:D,fontSize:22,background:fuelWindow===o.id?"rgba(0,255,135,0.12)":"rgba(12,12,18,0.8)",color:fuelWindow===o.id?"var(--g1)":"var(--dim)",border:"2px solid "+(fuelWindow===o.id?"rgba(0,255,135,0.25)":"rgba(0,255,135,0.04)")}}>{o.l}</button>})}</div>
        <label className="lbl">MEALS WERE MOSTLY...</label>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>{[{id:"green",i:"🟢",l:"Whole foods, veggies, protein",c:"#4CAF50"},{id:"yellow",i:"🟡",l:"Processed but okay",c:"#FFB300"},{id:"red",i:"🔴",l:"Fast food / junk / sugar",c:"#EF5350"}].map(function(m){return <button key={m.id} onClick={function(){setMealColor(m.id)}} style={{display:"flex",alignItems:"center",gap:12,padding:"16px 18px",background:mealColor===m.id?m.c+"18":"rgba(12,12,18,0.8)",border:"2px solid "+(mealColor===m.id?m.c+"50":"rgba(0,255,135,0.04)"),borderRadius:16}}><span style={{fontSize:22}}>{m.i}</span><span style={{fontFamily:D2,fontSize:15,color:mealColor===m.id?m.c:"var(--dim)",letterSpacing:"0.5px",textAlign:"left"}}>{m.l.toUpperCase()}</span>{mealColor===m.id&&<span style={{marginLeft:"auto",color:m.c,fontSize:18}}>✓</span>}</button>})}</div>
      </div>}

      {/* ═══ CARD 4: SUMMARY ═══ */}
      
      {/* ═══ §9e CARD 4: SUMMARY ═══ */}
      {card===4&&function(){var rd=calcReadiness();var scoreColor=rd.score>=70?"var(--grn)":rd.score>=40?"var(--g4)":"var(--red)";return <div className="ci" key="c4" style={{flex:1,padding:"24px 20px",overflowY:"auto"}}>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:56,marginBottom:12}} className="pi">{SCHOOL.LOGO}</div>
          <h2 className="gs" style={{fontFamily:D,fontSize:48,lineHeight:0.85,marginBottom:16}}>HUDDLE COMPLETE</h2>
        </div>

        {/* XP Earned */}
        <div className="gc2" style={{padding:20,width:"100%",maxWidth:320,margin:"0 auto",marginBottom:16}}>
          <div className="gs" style={{fontFamily:D,fontSize:56,lineHeight:0.9,marginBottom:12,textAlign:"center"}}>+{calcPts()} GP</div>
          {function(){var proofCount=sessions.filter(function(s){return s.proof}).length;return [{l:"Daily Streak",p:10,on:true},{l:"8+ Hours Sleep",p:20,on:["8","9","10+"].includes(sleepHrs)},{l:"Coach's Task",p:15,on:coachTask},{l:"Green Nutrition",p:5,on:mealColor==="green"},{l:"Proof of Grind (×"+proofCount+")",p:proofCount*5,on:proofCount>0}].map(function(r){return <div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(0,255,135,0.04)"}}><span style={{fontFamily:D2,fontSize:13,color:r.on?"var(--txt)":"var(--dim)",letterSpacing:"0.5px"}}>{r.l.toUpperCase()}</span><span style={{fontFamily:D,fontSize:18,color:r.on?"var(--g1)":"var(--dim)"}}>{r.on?"+"+r.p:"—"}</span></div>})}()}
        </div>

        {/* Readiness Score */}
        <div className="gc" style={{padding:"16px 20px",maxWidth:320,margin:"0 auto",border:rd.redFlag?"2px solid rgba(239,83,80,0.3)":"1px solid rgba(0,255,135,0.08)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontFamily:D2,fontSize:14,color:"var(--sub)",letterSpacing:"2px"}}>READINESS SCORE</span>
            <span style={{fontFamily:D,fontSize:36,color:scoreColor,lineHeight:0.9}}>{rd.score}<span style={{fontFamily:D2,fontSize:14,color:"var(--dim)"}}>/100</span></span>
          </div>
          <div style={{height:8,background:"rgba(124,58,237,0.06)",borderRadius:8,overflow:"hidden",marginBottom:rd.redFlag?12:0}}>
            <div style={{height:"100%",width:rd.score+"%",background:scoreColor,borderRadius:8,transition:"width 0.8s ease"}} />
          </div>
          {rd.redFlag&&<div style={{padding:"10px 14px",borderRadius:12,background:"rgba(239,83,80,0.08)",border:"1px solid rgba(239,83,80,0.15)"}}>
            <div style={{fontFamily:D,fontSize:16,color:"var(--red)",marginBottom:4}}>🚩 RED FLAG</div>
            {rd.reasons.map(function(r,i){return <div key={i} style={{fontFamily:D2,fontSize:13,color:"var(--red)",letterSpacing:"0.5px"}}>· {r.toUpperCase()}</div>})}
            <div style={{fontFamily:D2,fontSize:11,color:"var(--dim)",letterSpacing:"0.5px",marginTop:6}}>YOUR COACHING STAFF WILL BE NOTIFIED</div>
          </div>}
        </div>
      </div>}()}

      <div style={{padding:"16px 20px 28px"}}>
        {card<4?<button className="btn-gold" onClick={function(){if(canNext())setCard(card+1)}} disabled={!canNext()}>NEXT →</button>
        :<button className="btn-gold" onClick={finish} disabled={saving}>{saving?"SAVING...":"LOCK IT IN 🔒"}</button>}
      </div>
    </div>
  );
}


/* ████████████████████████████████████████████████████████████████████████
   §10  DASHBOARD — Athlete home with hero Huddle CTA
   ████████████████████████████████████████████████████████████████████████ */

function Dashboard({profile,todayCheckin,todaySessions,onHuddle,onSignOut}){
  var lv=gL(profile.xp),nxt=gN(profile.xp),pr=gP(profile.xp);
  var first=profile.first_name||profile.name.split(" ")[0]||"";
  var hr=new Date().getHours();
  var greet=hr<12?"GOOD MORNING":hr<17?"GOOD AFTERNOON":"GOOD EVENING";

  /* ── Conflict detection from today's sessions ── */
  var LOAD_CAUTION=600,LOAD_DANGER=900;
  var totalLoad=todaySessions.reduce(function(sum,s){return sum+(s.training_load||s.rpe*s.duration)},0);
  var sportSet={};todaySessions.forEach(function(s){sportSet[s.sport]=true});
  var distinctSports=Object.keys(sportSet);
  var hasConflict=distinctSports.length>=2;
  var loadLevel=totalLoad>=LOAD_DANGER?"danger":totalLoad>=LOAD_CAUTION?"caution":"ok";
  return(
    <div style={{padding:"0 0 110px"}}>

      {/* ═══ HERO: DAILY HUDDLE CTA ═══ */}
      {!todayCheckin?(<div style={{padding:"20px"}}>
        {/* Greeting */}
        <div style={{marginBottom:16}}>
          <div style={{fontFamily:D2,fontSize:14,color:"var(--dim)",letterSpacing:"4px"}}>{greet}</div>
          <div className="gs" style={{fontFamily:D,fontSize:40,lineHeight:0.9}}>{first.toUpperCase()} 👋</div>
        </div>

        {/* MASSIVE CTA */}
        <button onClick={onHuddle} style={{width:"100%",padding:"0",borderRadius:24,border:"3px solid rgba(0,255,135,0.25)",background:"linear-gradient(160deg,rgba(20,16,30,0.5),rgba(8,8,14,0.95))",textAlign:"center",marginBottom:20,position:"relative",overflow:"hidden",boxShadow:"0 0 40px rgba(0,255,135,0.08),0 0 80px rgba(0,255,135,0.03)"}}>
          {/* Animated gold glow orbs */}
          <div style={{position:"absolute",top:-60,right:-60,width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,255,135,0.1),transparent 70%)",animation:"orbFloat 3s ease infinite"}} />
          <div style={{position:"absolute",bottom:-40,left:-40,width:160,height:160,borderRadius:"50%",background:"radial-gradient(circle,rgba(124,58,237,0.08),transparent 70%)",animation:"orbFloat 4s ease 1s infinite"}} />
          <style>{"@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);opacity:0.5}50%{transform:translate(-5px,-12px) scale(1.15);opacity:1}}@keyframes huddlePulse{0%,100%{box-shadow:0 0 40px rgba(0,255,135,0.08),0 0 80px rgba(0,255,135,0.03)}50%{box-shadow:0 0 60px rgba(0,255,135,0.15),0 0 100px rgba(124,58,237,0.06)}}"}</style>

          <div style={{position:"relative",zIndex:1,padding:"32px 24px 28px"}}>
            <div style={{fontSize:64,marginBottom:12}}>⚔️</div>
            <div className="gs" style={{fontFamily:D,fontSize:52,lineHeight:0.85,letterSpacing:"2px"}}>DAILY HUDDLE</div>
            <div style={{fontFamily:D2,fontSize:16,color:"var(--sub)",letterSpacing:"3px",marginTop:8}}>SLEEP · BODY · WORK · FUEL</div>

            <div style={{height:3,background:"linear-gradient(90deg,transparent,var(--pr),var(--g1),var(--pr),transparent)",margin:"20px auto",maxWidth:200,opacity:0.5}} />

            <div style={{display:"inline-block",padding:"14px 40px",borderRadius:16,background:"linear-gradient(135deg,var(--g0),var(--g4),var(--g1),#fff)",fontFamily:D,fontSize:26,color:"var(--bg)",letterSpacing:"3px",boxShadow:"0 4px 30px rgba(0,255,135,0.3)"}}>
              START CHECK-IN →
            </div>
            <div style={{fontFamily:D2,fontSize:14,color:"var(--g4)",letterSpacing:"2px",marginTop:12}}>EARN UP TO +50 GP</div>
          </div>
        </button>
      </div>):(<div style={{padding:"20px"}}>
        {/* Greeting */}
        <div style={{marginBottom:16}}>
          <div style={{fontFamily:D2,fontSize:14,color:"var(--dim)",letterSpacing:"4px"}}>{greet}</div>
          <div className="gs" style={{fontFamily:D,fontSize:40,lineHeight:0.9}}>{first.toUpperCase()} 👋</div>
        </div>

        {/* Completed card */}
        <div className="gc" style={{padding:"20px",marginBottom:20,border:"1.5px solid rgba(76,175,80,0.15)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <div style={{width:48,height:48,borderRadius:14,background:"rgba(76,175,80,0.1)",border:"1.5px solid rgba(76,175,80,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>◆</div>
            <div style={{flex:1}}>
              <div className="gs" style={{fontFamily:D,fontSize:24}}>HUDDLE COMPLETE</div>
              <div style={{fontFamily:D2,fontSize:13,color:"var(--grn)",letterSpacing:"2px"}}>+{todayCheckin.points_earned} GP EARNED TODAY</div>
            </div>
          </div>
          <div className="gd" style={{margin:"10px 0"}} />
          <div style={{display:"flex",gap:10,flexWrap:"wrap",fontFamily:D2,fontSize:13,color:"var(--sub)",letterSpacing:"0.5px"}}>
            <span>😴 {todayCheckin.sleep_hrs}h {todayCheckin.sleep_quality==="good"?"👍":"👎"}</span>
            <span>{todayCheckin.readiness==="ready"?"😃":todayCheckin.readiness==="sluggish"?"😐":"😫"}</span>
            <span>🧠 {todayCheckin.stress}/5</span>
            <span>{todayCheckin.meal_color==="green"?"🟢":todayCheckin.meal_color==="yellow"?"🟡":"🔴"}</span>
            <span>💧 {todayCheckin.hydration}</span>
            {todayCheckin.coach_task&&<span style={{color:"var(--grn)"}}>✅ TASK</span>}
          </div>
          {todayCheckin.pain_zones&&todayCheckin.pain_zones.length>0&&todayCheckin.pain_zones.some(function(z){return !z.startsWith("level_")})&&<div style={{fontFamily:D2,fontSize:12,color:"var(--red)",letterSpacing:"0.5px",marginTop:8}}>
            ⚠️ PAIN: {todayCheckin.pain_zones.filter(function(z){return !z.startsWith("level_")}).map(function(z){var f=z.replace(/_/g," ");return f.charAt(0).toUpperCase()+f.slice(1)}).join(", ")}
            {todayCheckin.pain_zones.filter(function(z){return z.startsWith("level_")}).map(function(z){return " · Level "+z.replace("level_","")+"/10"})}
          </div>}
        </div>
      </div>)}

      {/* ═══ CONFLICT ALERT (shows when multi-sport or high load) ═══ */}
      {todaySessions.length>0&&(hasConflict||loadLevel!=="ok")&&<div style={{padding:"0 20px",marginBottom:16}}>
        <div style={{padding:"16px 18px",borderRadius:18,background:loadLevel==="danger"?"rgba(239,83,80,0.08)":hasConflict?"rgba(255,179,0,0.06)":"rgba(0,255,135,0.04)",border:"2px solid "+(loadLevel==="danger"?"rgba(239,83,80,0.25)":hasConflict?"rgba(255,179,0,0.2)":"rgba(0,255,135,0.1)")}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <span style={{fontSize:22}}>{loadLevel==="danger"?"🚨":hasConflict?"⚡":"📊"}</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:D,fontSize:20,color:loadLevel==="danger"?"var(--red)":hasConflict?"#FFB300":"var(--g1)"}}>{hasConflict?"MULTI-SPORT DAY":"HIGH TRAINING LOAD"}</div>
              <div style={{fontFamily:D2,fontSize:12,color:"var(--dim)",letterSpacing:"1px"}}>{distinctSports.length} SPORT{distinctSports.length>1?"S":""} · {todaySessions.length} SESSION{todaySessions.length>1?"S":""}</div>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontFamily:D2,fontSize:13,color:"var(--sub)",letterSpacing:"2px"}}>DAILY LOAD</span>
              <span style={{fontFamily:D,fontSize:24,color:loadLevel==="danger"?"var(--red)":loadLevel==="caution"?"#FFB300":"var(--g1)"}}>{totalLoad}</span>
            </div>
            <div style={{height:8,background:"rgba(124,58,237,0.06)",borderRadius:8,overflow:"hidden",position:"relative"}}>
              <div style={{height:"100%",width:Math.min(100,totalLoad/LOAD_DANGER*100)+"%",background:loadLevel==="danger"?"var(--red)":loadLevel==="caution"?"#FFB300":"var(--g1)",borderRadius:8}} />
              <div style={{position:"absolute",left:(LOAD_CAUTION/LOAD_DANGER*100)+"%",top:0,bottom:0,width:2,background:"rgba(255,179,0,0.4)"}} />
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
              <span style={{fontFamily:D2,fontSize:10,color:"var(--dim)"}}>0</span>
              <span style={{fontFamily:D2,fontSize:10,color:"#FFB300"}}>CAUTION {LOAD_CAUTION}</span>
              <span style={{fontFamily:D2,fontSize:10,color:"var(--red)"}}>DANGER {LOAD_DANGER}</span>
            </div>
          </div>
          {distinctSports.map(function(sport){
            var sportSessions=todaySessions.filter(function(s){return s.sport===sport});
            var sportLoad=sportSessions.reduce(function(sum,s){return sum+(s.training_load||s.rpe*s.duration)},0);
            return <div key={sport} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderTop:"1px solid rgba(0,255,135,0.04)"}}>
              <ST s={sport} />
              <span style={{fontFamily:D2,fontSize:12,color:"var(--sub)",flex:1}}>{sportSessions.map(function(s){return s.session_type}).join(", ")}</span>
              <span style={{fontFamily:D,fontSize:18,color:sportLoad>400?"var(--ember)":"var(--g4)"}}>{sportLoad}</span>
            </div>;
          })}
          {hasConflict&&<div style={{fontFamily:D2,fontSize:11,color:loadLevel==="danger"?"var(--red)":"#FFB300",letterSpacing:"0.5px",marginTop:8,padding:"8px 12px",borderRadius:10,background:loadLevel==="danger"?"rgba(239,83,80,0.06)":"rgba(255,179,0,0.04)"}}>
            {loadLevel==="danger"?"⚠️ TOTAL LOAD IS IN THE DANGER ZONE. CONSIDER REDUCING INTENSITY TOMORROW.":"⚡ MULTI-SPORT DAY LOGGED. YOUR COACHES CAN SEE YOUR COMBINED LOAD."}
          </div>}
        </div>
      </div>}

      {/* ═══ LEVEL + STATS (below the hero) ═══ */}
      <div style={{padding:"0 20px"}}>
        {/* Level card */}
        <div style={{position:"relative",borderRadius:20,padding:22,marginBottom:16,overflow:"hidden"}}>
          <div style={{position:"absolute",inset:-3,borderRadius:23,background:"conic-gradient(from 0deg,#7C3AED,#A855F7,#00FF87,#66FFAA,#fff,#66FFAA,#00FF87,#A855F7,#7C3AED)",animation:"spin 3s linear infinite",zIndex:0}} />
          <div style={{position:"absolute",inset:2,borderRadius:18,background:"linear-gradient(160deg,#12101C,#08080E)",zIndex:0}} />
          <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
          <div style={{position:"relative",zIndex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
              <div><div style={{fontFamily:D2,fontSize:16,color:"var(--dim)",letterSpacing:"4px"}}>LEVEL {lv.l}</div><div className="gs" style={{fontFamily:D,fontSize:36,lineHeight:0.9}}>{lv.i} {lv.t.toUpperCase()}</div></div>
              <div style={{textAlign:"right"}}><div className="gs" style={{fontFamily:D,fontSize:42,lineHeight:0.85}}>{profile.xp}</div><div style={{fontFamily:D2,fontSize:13,color:"var(--dim)",letterSpacing:"3px"}}>TOTAL GP</div></div>
            </div>
            <div className="xb" style={{height:14,position:"relative"}}><div className="xf" style={{width:pr+"%",height:"100%",position:"relative"}} /></div>
            {nxt&&<div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontFamily:D2,fontSize:13,color:"var(--dim)",letterSpacing:"1px"}}><span>{profile.xp} GP</span><span>{nxt.i} {nxt.t} — {nxt.x} GP</span></div>}
          </div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <div className="gc2" style={{padding:"16px 12px",textAlign:"center"}}><span className="fi" style={{fontSize:24}}>🔥</span><div className="gs" style={{fontFamily:D,fontSize:36,lineHeight:0.9,marginTop:4}}>{profile.streak}</div><div style={{fontFamily:D2,fontSize:11,color:"var(--dim)",letterSpacing:"2px",marginTop:4}}>DAY STREAK</div></div>
          <div className="gc2" style={{padding:"16px 12px",textAlign:"center"}}><span style={{fontSize:24}}>▲</span><div className="gs" style={{fontFamily:D,fontSize:36,lineHeight:0.9,marginTop:4}}>{profile.longest_streak}</div><div style={{fontFamily:D2,fontSize:11,color:"var(--dim)",letterSpacing:"2px",marginTop:4}}>BEST STREAK</div></div>
        </div>

        {/* My Sports */}
        <div className="gc" style={{padding:"12px 16px"}}>
          <div style={{fontFamily:D2,fontSize:14,color:"var(--sub)",letterSpacing:"2px",marginBottom:6}}>MY SPORTS</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{(profile.sports||[]).map(function(s){return <ST key={s} s={s} />})}</div>
        </div>
      </div>
    </div>
  );
}


/* ████████████████████████████████████████████████████████████████████████
   §11  LEADERBOARD — Live from Supabase leaderboard view
   ████████████████████████████████████████████████████████████████████████ */

function Leaderboard({myId}){
  var[data,setData]=useState([]);var[loading,setLoading]=useState(true);
  var LOAD_CAUTION=600,LOAD_DANGER=900;

  useEffect(function(){
    // Query the today_athlete_load view for leaderboard + conflict data
    SB.from('today_athlete_load').select('*').limit(50).then(function(res){
      if(res.error){
        // Fallback to basic leaderboard if view doesn't exist yet
        SB.from('leaderboard').select('*').limit(50).then(function(r2){
          if(!r2.error)setData(r2.data||[]);
          setLoading(false);
        });
      } else {
        // Sort by XP descending
        var sorted=(res.data||[]).sort(function(a,b){return(b.xp||0)-(a.xp||0)});
        setData(sorted);
        setLoading(false);
      }
    });
  },[]);

  if(loading)return <div style={{padding:40,textAlign:"center"}}><div className="gs" style={{fontFamily:D,fontSize:24}}>LOADING...</div></div>;

  // Count conflicts for summary
  var conflictCount=data.filter(function(a){return(a.sports_today||0)>=2}).length;
  var dangerCount=data.filter(function(a){return(a.today_load||0)>=LOAD_DANGER}).length;

  return(
    <div style={{padding:"20px 20px 110px"}}>
      <h1 className="gs" style={{fontFamily:D,fontSize:48,margin:"0 0 4px",lineHeight:0.9}}>{SCHOOL.LOGO} LEADERBOARD</h1>
      <p style={{fontFamily:D2,fontSize:16,color:"var(--dim)",margin:"0 0 16px",letterSpacing:"4px"}}>ALL {SCHOOL.SHORT_NAME}</p>

      {/* Conflict summary bar */}
      {(conflictCount>0||dangerCount>0)&&<div style={{display:"flex",gap:8,marginBottom:16}}>
        {conflictCount>0&&<div style={{flex:1,padding:"10px 14px",borderRadius:14,background:"rgba(255,179,0,0.06)",border:"1.5px solid rgba(255,179,0,0.2)",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>⚡</span>
          <div><div style={{fontFamily:D,fontSize:20,color:"#FFB300"}}>{conflictCount}</div><div style={{fontFamily:D2,fontSize:10,color:"var(--dim)",letterSpacing:"1px"}}>MULTI-SPORT</div></div>
        </div>}
        {dangerCount>0&&<div style={{flex:1,padding:"10px 14px",borderRadius:14,background:"rgba(239,83,80,0.06)",border:"1.5px solid rgba(239,83,80,0.2)",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:16}}>🚨</span>
          <div><div style={{fontFamily:D,fontSize:20,color:"var(--red)"}}>{dangerCount}</div><div style={{fontFamily:D2,fontSize:10,color:"var(--dim)",letterSpacing:"1px"}}>HIGH LOAD</div></div>
        </div>}
      </div>}

      {data.length===0&&<div className="gc" style={{padding:20,textAlign:"center"}}><div style={{fontFamily:D2,fontSize:16,color:"var(--dim)",letterSpacing:"2px"}}>NO ATHLETES YET — BE THE FIRST!</div></div>}

      {data.map(function(a,i){
        var isMe=a.id===myId||a.athlete_id===myId;
        var lv=gL(a.xp||0);
        var load=a.today_load||0;
        var sportsToday=a.sports_today||0;
        var hasConflict=sportsToday>=2;
        var loadLvl=load>=LOAD_DANGER?"danger":load>=LOAD_CAUTION?"caution":"ok";
        var hasFlag=a.red_flag;

        return <div key={a.id||a.athlete_id} className={isMe?"gc2":"gc"} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",marginBottom:10,border:hasFlag?"2px solid rgba(239,83,80,0.2)":hasConflict?"1.5px solid rgba(255,179,0,0.15)":undefined}}>
          {/* Rank */}
          <div style={{width:32,textAlign:"center"}}><span style={{fontFamily:D,fontSize:i<3?22:20,color:i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":"var(--dim)"}}>{i<3?["🥇","🥈","🥉"][i]:(i+1)}</span></div>

          {/* Name + details */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontFamily:D2,fontSize:18,color:"var(--txt)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:"1px"}}>{(a.name||"").toUpperCase()}</span>
              {isMe&&<span style={{fontFamily:D2,fontSize:11,padding:"2px 8px",borderRadius:8,background:"rgba(0,255,135,0.1)",color:"var(--g1)",letterSpacing:"2px"}}>YOU</span>}
              {hasFlag&&<span style={{fontSize:12}}>🚩</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3,flexWrap:"wrap"}}>
              <span style={{fontFamily:D2,fontSize:12,color:"var(--dim)"}}>{lv.i} LVL {lv.l}</span>
              {(a.sports||[]).slice(0,2).map(function(s){return <ST key={s} s={s} />})}
              {(a.streak||0)>0&&<span style={{fontFamily:D2,fontSize:11,color:"var(--ember)"}}>🔥{a.streak}d</span>}
            </div>

            {/* Conflict + load badges */}
            {(hasConflict||load>0)&&<div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
              {hasConflict&&<span style={{fontFamily:D2,fontSize:10,padding:"2px 8px",borderRadius:8,background:"rgba(255,179,0,0.1)",color:"#FFB300",border:"1px solid rgba(255,179,0,0.15)",letterSpacing:"1px"}}>⚡ {sportsToday} SPORTS</span>}
              {load>0&&<span style={{fontFamily:D2,fontSize:10,padding:"2px 8px",borderRadius:8,background:loadLvl==="danger"?"rgba(239,83,80,0.1)":loadLvl==="caution"?"rgba(255,179,0,0.08)":"rgba(124,58,237,0.06)",color:loadLvl==="danger"?"var(--red)":loadLvl==="caution"?"#FFB300":"var(--g4)",border:"1px solid "+(loadLvl==="danger"?"rgba(239,83,80,0.15)":"rgba(0,255,135,0.08)"),letterSpacing:"1px"}}>LOAD {load}</span>}
            </div>}
          </div>

          {/* XP */}
          <div style={{textAlign:"right"}}><div className="gs" style={{fontFamily:D,fontSize:28,lineHeight:1}}>{a.xp||0}</div><div style={{fontFamily:D2,fontSize:11,color:"var(--dim)",letterSpacing:"2px"}}>XP</div></div>
        </div>;
      })}
    </div>
  );
}

/* ████████████████████████████████████████████████████████████████████████
   §12a  PROFILE PAGE — Settings, edit sports, sign out
   ████████████████████████████████████████████████████████████████████████ */

function ProfilePage({profile, onSignOut, onUpdateSports}) {
  var lv = gL(profile.xp);
  var [editing, setEditing] = useState(false);
  var [sel, setSel] = useState([].concat(profile.sports || []));

  function togSport(s) { setSel(function(p) { return p.includes(s) ? p.filter(function(x){return x!==s}) : [].concat(p,[s]); }); }

  return (
    <div style={{padding:"20px 20px 110px"}}>
      {/* Avatar + name */}
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,rgba(0,255,135,0.12),rgba(255,140,0,0.06))",border:"3px solid rgba(0,255,135,0.2)",margin:"0 auto 14px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>{lv.i}</div>
        <div className="gs" style={{fontFamily:D,fontSize:36,lineHeight:0.9}}>{profile.name.toUpperCase()}</div>
        <div style={{fontFamily:D2,fontSize:14,color:"var(--dim)",letterSpacing:"2px",marginTop:6}}>GRADE {profile.grade} · {lv.t.toUpperCase()} · LVL {lv.l}</div>
        <div style={{fontFamily:D2,fontSize:13,color:"var(--sub)",letterSpacing:"1px",marginTop:4}}>{profile.email}</div>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
        <div className="gc" style={{padding:"14px 8px",textAlign:"center"}}><div className="gs" style={{fontFamily:D,fontSize:28}}>{profile.xp}</div><div style={{fontFamily:D2,fontSize:10,color:"var(--dim)",letterSpacing:"2px",marginTop:4}}>TOTAL GP</div></div>
        <div className="gc" style={{padding:"14px 8px",textAlign:"center"}}><div className="gs" style={{fontFamily:D,fontSize:28}}>{profile.streak}</div><div style={{fontFamily:D2,fontSize:10,color:"var(--dim)",letterSpacing:"2px",marginTop:4}}>STREAK</div></div>
        <div className="gc" style={{padding:"14px 8px",textAlign:"center"}}><div className="gs" style={{fontFamily:D,fontSize:28}}>{profile.longest_streak}</div><div style={{fontFamily:D2,fontSize:10,color:"var(--dim)",letterSpacing:"2px",marginTop:4}}>BEST</div></div>
      </div>

      {/* My Sports — view or edit */}
      <div className="gc" style={{padding:"18px",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontFamily:D,fontSize:20,color:"var(--sub)"}}>MY SPORTS</span>
          <button onClick={function(){setEditing(!editing);setSel([].concat(profile.sports||[]))}} style={{background:"none",border:"1px solid rgba(0,255,135,0.1)",borderRadius:10,padding:"4px 14px",fontFamily:D2,fontSize:12,color:"var(--g4)",letterSpacing:"1px"}}>{editing?"CANCEL":"EDIT"}</button>
        </div>
        {!editing ? (
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{(profile.sports||[]).map(function(s){return <ST key={s} s={s} />})}</div>
        ) : (
          <div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
              {ALL_SPORTS.map(function(s) {
                var on = sel.includes(s);
                return <button key={s} onClick={function(){togSport(s)}} style={{padding:"8px 14px",borderRadius:12,fontFamily:D2,fontSize:13,letterSpacing:"1px",background:on?"rgba(0,255,135,0.12)":"rgba(12,12,18,0.8)",color:on?"var(--g1)":"var(--dim)",border:"1.5px solid "+(on?"rgba(0,255,135,0.3)":"rgba(0,255,135,0.04)")}}>{on?"✓ ":""}{s.toUpperCase()}</button>;
              })}
            </div>
            <button onClick={function(){if(sel.length>0){onUpdateSports(sel);setEditing(false)}}} disabled={sel.length===0} className="btn-gold" style={{fontSize:18,padding:14}}>SAVE SPORTS</button>
          </div>
        )}
      </div>

      {/* Account section */}
      <div className="gc" style={{padding:"18px"}}>
        <div style={{fontFamily:D,fontSize:20,color:"var(--sub)",marginBottom:14}}>ACCOUNT</div>
        <div style={{fontFamily:D2,fontSize:14,color:"var(--dim)",letterSpacing:"0.5px",marginBottom:12}}>
          ROLE: {(profile.role||"athlete").toUpperCase()}
        </div>
        <div style={{fontFamily:D2,fontSize:14,color:"var(--dim)",letterSpacing:"0.5px",marginBottom:16}}>
          MEMBER SINCE: {new Date(profile.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase()}
        </div>
        <button onClick={onSignOut} style={{width:"100%",padding:"16px",borderRadius:14,border:"2px solid rgba(239,83,80,0.2)",background:"rgba(239,83,80,0.04)",fontFamily:D,fontSize:20,color:"var(--red)",letterSpacing:"2px"}}>SIGN OUT</button>
      </div>
    </div>
  );
}


/* ████████████████████████████████████████████████████████████████████████
   §12b  LEVEL UP CELEBRATION — Full-screen overlay on XP threshold
   ████████████████████████████████████████████████████████████████████████ */

function LevelUp({level, onDismiss}) {
  var [phase, setPhase] = useState(0);
  useEffect(function() {
    var a = setTimeout(function(){ setPhase(1); }, 200);
    var b = setTimeout(function(){ setPhase(2); }, 800);
    var c = setTimeout(function(){ setPhase(3); }, 1600);
    return function(){ clearTimeout(a); clearTimeout(b); clearTimeout(c); };
  }, []);

  return (
    <div style={{position:"fixed",inset:0,zIndex:250,background:"rgba(2,2,1,0.95)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40}}>
      {/* Gold burst */}
      <div style={{position:"absolute",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(0,255,135,0.12),rgba(255,140,0,0.04) 40%,transparent 65%)",animation:"fadeUp 1s ease"}} />

      {/* Level icon — massive */}
      {phase >= 1 && <div style={{fontSize:96,marginBottom:16,animation:"popIn 0.6s cubic-bezier(0.34,1.5,0.64,1) both"}}>
        <style>{"@keyframes popIn{0%{transform:scale(0.2);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}"}</style>
        {level.i}
      </div>}

      {/* LEVEL UP text */}
      {phase >= 1 && <div style={{animation:"fadeUp 0.5s ease both"}}>
        <div style={{fontFamily:D2,fontSize:22,color:"var(--g4)",letterSpacing:"6px",textAlign:"center"}}>LEVEL UP</div>
        <div className="gs" style={{fontFamily:D,fontSize:64,lineHeight:0.85,textAlign:"center",letterSpacing:"2px"}}>{level.t.toUpperCase()}</div>
        <div style={{fontFamily:D2,fontSize:18,color:"var(--dim)",letterSpacing:"4px",textAlign:"center",marginTop:8}}>LEVEL {level.l}</div>
      </div>}

      {/* XP threshold */}
      {phase >= 2 && <div style={{marginTop:24,animation:"fadeUp 0.5s ease both"}}>
        <div style={{fontFamily:D2,fontSize:14,color:"var(--sub)",letterSpacing:"3px",textAlign:"center"}}>GP THRESHOLD REACHED</div>
        <div className="gs" style={{fontFamily:D,fontSize:40,textAlign:"center"}}>{level.x} GP</div>
      </div>}

      {/* Continue button */}
      {phase >= 3 && <button onClick={onDismiss} style={{marginTop:32,padding:"16px 48px",borderRadius:16,border:"none",fontFamily:D,fontSize:24,letterSpacing:"3px",background:"linear-gradient(135deg,var(--g0),var(--g4),var(--g1),#fff)",color:"var(--bg)",boxShadow:"0 4px 40px rgba(0,255,135,0.3)",animation:"fadeUp 0.4s ease both"}}>CONTINUE</button>}
    </div>
  );
}


// ═══ NAV ═══

/* ████████████████████████████████████████████████████████████████████████
   §12  NAV — Bottom tab bar
   ████████████████████████████████████████████████████████████████████████ */

function Nav({page,onNav}){
  return <div style={{position:"fixed",bottom:0,left:0,right:0,display:"flex",justifyContent:"center",padding:"8px 0 16px",background:"linear-gradient(180deg,transparent,rgba(2,2,1,0.98) 30%,var(--bg))",borderTop:"1px solid rgba(124,58,237,0.06)",zIndex:100}}>
    {[{id:"home",i:"◆",l:"HOME"},{id:"board",i:SCHOOL.LOGO,l:"BOARD"},{id:"profile",i:"👤",l:"PROFILE"}].map(function(it){return <button key={it.id} onClick={function(){onNav(it.id)}} style={{flex:1,maxWidth:110,background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"6px 0"}}>
      <span style={{fontSize:26,filter:page===it.id?"drop-shadow(0 0 8px rgba(0,255,135,0.4))":"grayscale(1) opacity(0.25)"}}>{it.i}</span>
      <span style={{fontFamily:D2,fontSize:13,letterSpacing:"3px",color:page===it.id?"var(--g1)":"var(--dim)"}}>{it.l}</span>
    </button>})}
  </div>;
}


/* ████████████████████████████████████████████████████████████████████████
   §13  APP — Auth state machine + route orchestrator
   ████████████████████████████████████████████████████████████████████████ */

function App(){
  var[loading,setLoading]=useState(true);
  var[user,setUser]=useState(null);      // auth user
  var[profile,setProfile]=useState(null); // profiles row
  var[page,setPage]=useState("home");
  var[inHuddle,setInHuddle]=useState(false);
  var[todayCheckin,setTodayCheckin]=useState(null);
  var[todaySessions,setTodaySessions]=useState([]);
  var[levelUp,setLevelUp]=useState(null); /* level-up celebration data */
  var[toastMsg,setToastMsg]=useState(null);var[toastType,setToastType]=useState("ok");

  function toast(msg,type){setToastMsg(msg);setToastType(type||"ok");clearTimeout(toastTimer);toastTimer=setTimeout(function(){setToastMsg(null)},3000)}

  // Load profile + today's check-in + today's sessions
  async function loadProfile(uid){
    var p=await SB.from('profiles').select('*').eq('id',uid).single();
    if(p.data)setProfile(p.data);
    var c=await SB.from('checkins').select('*').eq('athlete_id',uid).eq('date',today()).maybeSingle();
    if(c.data)setTodayCheckin(c.data);
    var s=await SB.from('sessions').select('*').eq('athlete_id',uid).eq('date',today());
    if(s.data)setTodaySessions(s.data);
    return p.data;
  }

  // Auth listener
  useEffect(function(){
    SB.auth.getSession().then(function(res){
      var s=res.data.session;
      if(s&&s.user){setUser(s.user);loadProfile(s.user.id).then(function(){setLoading(false)})}
      else{setLoading(false)}
    });
    var{data:{subscription}}=SB.auth.onAuthStateChange(function(event,session){
      if(event==='SIGNED_IN'&&session){setUser(session.user);loadProfile(session.user.id)}
      if(event==='SIGNED_OUT'){setUser(null);setProfile(null);setTodayCheckin(null);setTodaySessions([])}
    });
    return function(){subscription.unsubscribe()};
  },[]);

  async function signOut(){await SB.auth.signOut();setUser(null);setProfile(null);setPage("home")}

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div className="gs" style={{fontFamily:D,fontSize:32}}>LOADING...</div></div>;

  // Not logged in → Auth screen
  if(!user)return <><Toast msg={toastMsg} type={toastType} /><AuthScreen toast={toast} /></>;

  // Logged in but profile incomplete → Onboarding
  if(profile&&(!profile.name||!profile.first_name||profile.name===''))return <><Toast msg={toastMsg} type={toastType} /><Onboarding user={user} toast={toast} onDone={function(){loadProfile(user.id)}} /></>;

  // Logged in but profile not loaded yet
  if(!profile)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div className="gs" style={{fontFamily:D,fontSize:32}}>LOADING...</div></div>;

  // In huddle
  if(inHuddle)return <><Toast msg={toastMsg} type={toastType} /><Huddle profile={profile} toast={toast} onCancel={function(){setInHuddle(false)}} onDone={function(data){
    var oldLevel=gL(profile.xp);
    var newLevel=gL(data.xp);
    setInHuddle(false);
    setProfile(Object.assign({},profile,{xp:data.xp,streak:data.streak,longest_streak:Math.max(profile.longest_streak,data.streak)}));
    loadProfile(user.id);
    toast("+"+data.points+" GP EARNED!","ok");
    /* Check for level-up */
    if(newLevel.l>oldLevel.l){setLevelUp(newLevel)}
  }} /></>;

  /* Level-up celebration overlay */
  if(levelUp)return <LevelUp level={levelUp} onDismiss={function(){setLevelUp(null)}} />;

  return(
    <div style={{background:"var(--bg)",minHeight:"100vh",color:"var(--txt)",maxWidth:480,margin:"0 auto"}}>
      <Toast msg={toastMsg} type={toastType} />

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:100,padding:"12px 20px",background:"linear-gradient(180deg,var(--bg),rgba(2,2,1,0.97))",borderBottom:"1px solid rgba(0,255,135,0.08)",backdropFilter:"blur(20px)",display:"flex",alignItems:"center"}}>
        <span style={{fontSize:24}}>{SCHOOL.LOGO}</span>
        <div style={{marginLeft:10}}><div className="gs" style={{fontFamily:D,fontSize:22,lineHeight:1}}>{SCHOOL.APP_NAME}</div><div style={{fontFamily:D2,fontSize:11,color:"var(--dim)",letterSpacing:"3px"}}>{profile.first_name.toUpperCase()} · {(profile.sports||[]).slice(0,2).join(" · ").toUpperCase()}</div></div>
      </div>

      {page==="home"&&<Dashboard profile={profile} todayCheckin={todayCheckin} todaySessions={todaySessions} onHuddle={function(){setInHuddle(true)}} onSignOut={signOut} />}
      {page==="board"&&<Leaderboard myId={user.id} />}
      {page==="profile"&&<ProfilePage profile={profile} onSignOut={signOut} onUpdateSports={function(s){SB.rpc('update_my_sports',{p_sports:s}).then(function(){loadProfile(user.id);toast("Sports updated!","ok")})}} />}
      <Nav page={page} onNav={setPage} />
    </div>
  );
}


/* ████████████████████████████████████████████████████████████████████████
   §14  MOUNT
   ████████████████████████████████████████████████████████████████████████ */

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
